<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão de contas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        {% include "head.html" %}
        <main class="container-fluid">
            <h3 class="border-bottom">Editar Entradas</h3>
            {% include "flash.html" %}
            <form action="/{{ ano }}/{{ mes }}/{{ entrada.id }}" method="post">
                <div class="row">
                    <div class="form-label-group p-3">
                        <label for="descricao">Descrição:</label>
                        <input id="descricao" name="descricao" class="form-control" value="{{ entrada.descricao }}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col form-label-group p-3">
                        <label for="pago">Pago em:</label>
                        <input type="date" id="pago" name="pago" class="form-control" value="{{ entrada.pago }}">
                    </div>
                    <div class="col form-label-group p-3">
                        <label for="agendado">Agendado em :{{ entrada.agendado }}</label>
                        <input type="date" id="agendado" name="agendado" class="form-control" value="{{ entrada.agendado }}">
                    </div>
                </div>
                <div class="row">
                    <div class="form-label-group p-3">
                        <label for="valor">Valor:</label>
                        <input id="valor" name="valor" class="form-control text-end" value="{{ entrada.valor }}">
                    </div>
                </div>
                <div class="row">
                    <div class="form-label-group p-3">
                        <label for="comentario">Comentário:</label>
                        <textarea id="comentario" name="comentario" class="form-control">{{ entrada.comentario }}</textarea>
                    </div>
                </div>
                <p class="text-center"><a class="btn btn-primary" href="/{{ ano }}/{{ mes }}">Voltar</a> <button class="btn btn-primary" type="submit">Salvar</button></p>
            </form>
        </main>
        {% include "footer.html" %}
    </div>
    <script src="{{ url_for('static', filename='vanilla-masker.js') }}"></script>
    <script src="{{ url_for('static', filename='jscore.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
